on:
  push:
    branches:
      - main

name: Test with Coveralls

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm
      - name: Install and test coverage
        run: |
          pnpm install --frozen-lockfile
          pnpm lint
          pnpm typecheck
          pnpm build
          pnpm package:quality
          pnpm package:size
          pnpm test:coverage
      - name: Upload coverage to Coveralls (attempt 1)
        id: coveralls_1
        uses: coverallsapp/github-action@v2.3.6
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: ./coverage/lcov.info
          format: lcov
      - name: Wait before Coveralls retry
        if: ${{ steps.coveralls_1.outcome == 'failure' }}
        run: sleep 30
      - name: Upload coverage to Coveralls (attempt 2)
        id: coveralls_2
        if: ${{ steps.coveralls_1.outcome == 'failure' }}
        uses: coverallsapp/github-action@v2.3.6
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: ./coverage/lcov.info
          format: lcov
      - name: Wait before final Coveralls retry
        if: ${{ steps.coveralls_1.outcome == 'failure' && steps.coveralls_2.outcome == 'failure' }}
        run: sleep 90
      - name: Upload coverage to Coveralls (attempt 3)
        if: ${{ steps.coveralls_1.outcome == 'failure' && steps.coveralls_2.outcome == 'failure' }}
        uses: coverallsapp/github-action@v2.3.6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: ./coverage/lcov.info
          format: lcov
