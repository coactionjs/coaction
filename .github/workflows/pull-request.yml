on:
  pull_request:
    types:
      - labeled
      - reopened
      - synchronize
      - ready_for_review

name: Test Coverage
permissions:
  contents: read
  pull-requests: write
jobs:
  build:
    name: Build
    if: contains(github.event.pull_request.labels.*.name, 'run-ci') && !github.event.pull_request.draft
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm
      - name: Install and test coverage
        run: |
          pnpm install --frozen-lockfile
          pnpm lint
          pnpm typecheck
          pnpm build
          pnpm test:coverage
      - name: Coverage
        uses: romeovs/lcov-reporter-action@v0.4.0
        with:
          lcov-file: ./coverage/lcov.info
  browser-e2e:
    name: Browser E2E
    if: contains(github.event.pull_request.labels.*.name, 'run-ci') && !github.event.pull_request.draft
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Run browser E2E
        run: pnpm test:e2e:browser
