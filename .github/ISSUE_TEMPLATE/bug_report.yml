name: Bug report
description: Report a reproducible problem in Coaction.
title: 'bug: '
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. A minimal reproduction is the fastest path to a fix.
  - type: input
    id: package
    attributes:
      label: Package
      description: Which package is affected?
      placeholder: coaction, @coaction/react, @coaction/yjs
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Which version are you using?
      placeholder: 2.0.0
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Link to a repository, StackBlitz, or paste the smallest code sample that reproduces the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include Node.js, package manager, browser, framework, and OS when relevant.
      placeholder: |
        Node:
        pnpm:
        Browser:
        Framework:
        OS:
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and pull requests.
          required: true
        - label: I checked the support matrix for this behavior.
          required: true
