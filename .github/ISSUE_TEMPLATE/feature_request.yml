name: Feature request
description: Propose a new capability or compatibility guarantee.
title: 'feat: '
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the API, behavior, or compatibility change you want.
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      options:
        - Core runtime
        - Framework binding
        - State adapter
        - Middleware
        - Documentation
        - Tooling
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What can users do today, and why is it not enough?
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and pull requests.
          required: true
        - label: I checked the support matrix for the current guarantee.
          required: true
